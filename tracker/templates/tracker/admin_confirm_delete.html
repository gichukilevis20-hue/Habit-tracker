{% extends 'tracker/admin_workspace_base.html' %}

{% block admin_workspace_content %}
<section class="section-block">
    <div class="row justify-content-center">
        <div class="col-xl-7">
            <div class="form-panel">
                <span class="section-kicker">Delete Record</span>
                <h2 class="section-title mt-2">Delete {{ object_label }}?</h2>
                <p class="muted-copy">{{ admin_page_subtitle }}</p>
                {% if object_meta %}
                    <div class="timeline-card mb-4">
                        <strong>{{ object_label }}</strong>
                        <p class="muted-copy mb-0 mt-2">{{ object_meta }}</p>
                    </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-danger" type="submit">{{ delete_label|default:"Delete" }}</button>
                        <a class="btn btn-soft" href="{{ cancel_url }}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
